name: Watcher

on:
  workflow_dispatch:
    inputs:
      mb_email:
        description: "Mindbody email"
        required: true
      mb_password:
        description: "Mindbody jelszó"
        required: true
      mb_studio_id:
        description: "Studio ID"
        required: true

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # max 6 óra fut

    steps:
      - name: Kód letöltése
        uses: actions/checkout@v4

      - name: Várakozás és foglalás indítása
        env:
          GH_TOKEN: ${{ secrets.MY_PAT }}
          REPO:     ${{ github.repository }}
          MB_EMAIL:     ${{ github.event.inputs.mb_email }}
          MB_PASSWORD:  ${{ github.event.inputs.mb_password }}
          MB_STUDIO_ID: ${{ github.event.inputs.mb_studio_id }}
        run: |
          echo "Watcher elindult. Olvasom a schedule.json-t..."

          # config.json és schedule.json beolvasása
          if [ ! -f schedule.json ]; then
            echo "Hiányzó schedule.json, kilépés."
            exit 1
          fi

          RUN_AT=$(jq -r '.run_at' schedule.json)
          INSTRUCTOR=$(jq -r '.instructor' schedule.json)
          CLASS_DATE=$(jq -r '.class_date' schedule.json)
          CLASS_TIME=$(jq -r '.class_time // ""' schedule.json)
          LOCATION=$(jq -r '.location' schedule.json)

          echo "Ütemezve: $INSTRUCTOR / $CLASS_DATE $CLASS_TIME"
          echo "Foglalás időpontja: $RUN_AT"

          # Várakozási ciklus
          while true; do
            NOW=$(date -u +%s)
            TARGET=$(date -u -d "$RUN_AT" +%s)
            DIFF=$((TARGET - NOW))

            echo "Hátralévő idő: ${DIFF} másodperc"

            if [ $DIFF -le 0 ]; then
              echo "Elértük az időpontot! Foglalás indítása..."

              # Booker workflow elindítása
              gh workflow run book.yml \
                --repo "$REPO" \
                --ref main \
                --field instructor="$INSTRUCTOR" \
                --field class_date="$CLASS_DATE" \
                --field class_time="$CLASS_TIME" \
                --field location="$LOCATION" \
                --field mb_email="$MB_EMAIL" \
                --field mb_password="$MB_PASSWORD" \
                --field mb_studio_id="$MB_STUDIO_ID"

              echo "Foglalás elindítva! Watcher leáll."
              exit 0
            fi

            # 5 percenként ellenőriz, de ha kevesebb mint 5 perc van hátra,
            # pontosabban vár
            if [ $DIFF -le 300 ]; then
              sleep 30
            else
              sleep 300
            fi
          done
