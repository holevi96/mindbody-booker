name: Mindbody Booker

on:
  workflow_dispatch:
    inputs:
      instructor:
        description: "Edző neve"
        required: true
      class_date:
        description: "Dátum (pl. 25/03/2026)"
        required: true
      class_time:
        description: "Óra kezdete (pl. 11:00)"
        required: false
        default: ""
      location:
        description: "Helyszín ID"
        required: false
        default: "2"
      mb_email:
        description: "Mindbody email"
        required: true
      mb_password:
        description: "Mindbody jelszó"
        required: true
      mb_studio_id:
        description: "Studio ID"
        required: true

jobs:
  book:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Kód letöltése
        uses: actions/checkout@v4

      - name: Python beállítása
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Függőségek telepítése
        run: |
          pip install playwright beautifulsoup4
          playwright install chromium
          playwright install-deps chromium

      - name: Futtatás
        env:
          MB_EMAIL:      ${{ github.event.inputs.mb_email }}
          MB_PASSWORD:   ${{ github.event.inputs.mb_password }}
          MB_STUDIO_ID:  ${{ github.event.inputs.mb_studio_id }}
          MB_INSTRUCTOR: ${{ github.event.inputs.instructor }}
          MB_CLASS_DATE: ${{ github.event.inputs.class_date }}
          MB_CLASS_TIME: ${{ github.event.inputs.class_time }}
          MB_LOCATION:   ${{ github.event.inputs.location }}
        run: python booker.py

      - name: Screenshot feltöltése hiba esetén
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-screenshot
          path: error.png
