name: Mindbody Booker

on:
  workflow_dispatch:
    inputs:
      instructor:
        description: "Edző neve (pl. Ujvári Cili)"
        required: true
      class_name:
        description: "Óra neve (pl. TRX köredzés)"
        required: true
      class_date:
        description: "Dátum (pl. 3/30/2026)"
        required: true
      location:
        description: "Helyszín ID (alapértelmezett: 2)"
        required: false
        default: "2"

jobs:
  book:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Kód letöltése
        uses: actions/checkout@v4

      - name: Python beállítása
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Függőségek telepítése
        run: pip install requests beautifulsoup4

      - name: Futtatás
        env:
          MB_EMAIL:       ${{ secrets.MB_EMAIL }}
          MB_PASSWORD:    ${{ secrets.MB_PASSWORD }}
          MB_STUDIO_ID:   ${{ secrets.MB_STUDIO_ID }}
          MB_INSTRUCTOR:  ${{ github.event.inputs.instructor }}
          MB_CLASS:       ${{ github.event.inputs.class_name }}
          MB_CLASS_DATE:  ${{ github.event.inputs.class_date }}
          MB_LOCATION:    ${{ github.event.inputs.location }}
        run: python booker.py
