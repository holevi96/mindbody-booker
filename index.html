<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mindbody Foglalás</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .container { width: 100%; max-width: 480px; }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 1.5rem; color: #111; }
    .card {
      background: #fff; border-radius: 12px; padding: 1.25rem;
      margin-bottom: 1rem; border: 1px solid #e5e5e5;
    }
    .card-title {
      font-size: 12px; font-weight: 600; color: #888;
      text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 1rem;
    }
    label { font-size: 14px; font-weight: 500; color: #333; display: block; margin-bottom: 6px; margin-top: 14px; }
    label:first-of-type { margin-top: 0; }
    input {
      width: 100%; padding: 10px 12px; border: 1px solid #ddd;
      border-radius: 8px; font-size: 15px; color: #111;
      background: #fafafa; transition: border-color 0.15s; -webkit-appearance: none;
    }
    input:focus { outline: none; border-color: #555; background: #fff; }
    select {
      width: 100%; padding: 10px 12px; border: 1px solid #ddd;
      border-radius: 8px; font-size: 15px; color: #111;
      background: #fafafa; transition: border-color 0.15s; -webkit-appearance: none;
      cursor: pointer;
    }
    select:focus { outline: none; border-color: #555; background: #fff; }
    .select-row { display: flex; gap: 8px; align-items: center; }
    .select-row select { flex: 1; min-width: 0; }
    .fav-btn {
      padding: 10px 11px; border: 1px solid #ddd; border-radius: 8px;
      background: #fafafa; cursor: pointer; font-size: 16px; line-height: 1;
      flex-shrink: 0; transition: background 0.15s, border-color 0.15s;
    }
    .fav-btn:hover { background: #fff8e1; border-color: #f0c040; }
    .hint { font-size: 12px; color: #999; margin-top: 5px; }
    .hint a { color: #555; }
    .btn {
      width: 100%; padding: 12px; background: #111; color: #fff;
      border: none; border-radius: 8px; font-size: 16px; font-weight: 500;
      cursor: pointer; margin-top: 1.25rem; transition: background 0.15s, transform 0.1s;
    }
    .btn:hover { background: #333; }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { background: #999; cursor: not-allowed; }
    .btn-secondary { background: #fff; color: #111; border: 1px solid #ddd; }
    .btn-secondary:hover { background: #f5f5f5; }
    .status {
      margin-top: 1rem; padding: 12px; border-radius: 8px;
      font-size: 14px; display: none; white-space: pre-line; line-height: 1.6;
    }
    .status.ok { background: #e6f4ea; color: #1a7a38; display: block; }
    .status.err { background: #fce8e8; color: #b91c1c; display: block; }
    .status.loading { background: #f0f0f0; color: #555; display: block; }
    .settings-toggle {
      font-size: 13px; color: #888; cursor: pointer;
      text-decoration: underline; text-align: center;
      margin-top: 0.5rem; display: block;
    }
    .settings-card { display: none; margin-top: 0.75rem; }
    .settings-card.open { display: block; }
    .saved-badge {
      display: inline-block; background: #e6f4ea; color: #1a7a38;
      font-size: 11px; padding: 2px 8px; border-radius: 20px; margin-left: 8px;
    }
    .time-preview { font-size: 13px; color: #555; margin-top: 6px; min-height: 18px; }
    .divider { border: none; border-top: 1px solid #eee; margin: 1.25rem 0; }
  </style>
</head>
<body>
<div class="container">
  <h1>🏋️ Mindbody foglalás</h1>

  <!-- EDZÉS ADATAI -->
  <div class="card">
    <div class="card-title">Edzés adatai</div>
    <label>Edző neve</label>
    <div class="select-row">
      <select id="instructor"></select>
      <button type="button" class="fav-btn" id="favBtn" onclick="saveFavourite()" title="Kedvenc beállítása">⭐</button>
    </div>
<label>Edzés dátuma</label>
    <input type="text" id="class_date" placeholder="pl. 30/03/2026" readonly>
    <label>Óra kezdete</label>
    <input type="time" id="class_time">
    <label>Helyszín</label>
    <select id="location">
      <option value="4">Life1 Allee Fitness</option>
      <option value="2" selected>Life1 Corvin Wellness</option>
      <option value="7">Life1 Etele Fitness</option>
      <option value="8">Life1 Fitness Springday</option>
      <option value="9">Life1 Fitness Váci35</option>
      <option value="3">Life1 Nyugati Fitness</option>
    </select>
  </div>

  <!-- IDŐZÍTÉS -->
  <div class="card">
    <div class="card-title">Mikor induljon el a foglalás?</div>
    <label>Időpont</label>
    <input type="datetime-local" id="run_at">
    <p class="hint">Pl. éjfél előtt 2 perccel: 23:58</p>
    <p class="time-preview" id="time_preview"></p>
  </div>

  <button class="btn" id="scheduleBtn" onclick="schedule()">⏰ Foglalás ütemezése</button>
  <div class="status" id="status"></div>

  <!-- BEÁLLÍTÁSOK -->
  <span class="settings-toggle" onclick="toggleSettings()">
    ⚙️ Beállítások
    <span id="settings-saved" style="display:none" class="saved-badge">mentve</span>
  </span>

  <div class="card settings-card" id="settings-card">
    <div class="card-title">GitHub</div>
    <label>GitHub token</label>
    <input type="password" id="gh_token" placeholder="ghp_...">
    <p class="hint">
      <a href="https://github.com/settings/tokens/new" target="_blank">Létrehozás →</a>
      &nbsp;workflow scope kell
    </p>
    <label>GitHub repó</label>
    <input type="text" id="gh_repo" placeholder="felhasználónév/mindbody-booker">

    <hr class="divider">

    <div class="card-title">Mindbody fiók</div>
    <label>Email</label>
    <input type="email" id="mb_email" placeholder="pelda@email.com">
    <label>Jelszó</label>
    <input type="password" id="mb_password" placeholder="••••••••">
    <label>Studio ID</label>
    <input type="text" id="mb_studio_id" placeholder="pl. 48016">
    <p class="hint">Az URL-ből: clients.mindbodyonline.com/...?studioid=XXXXX</p>

    <button class="btn btn-secondary" onclick="saveSettings()">
      Beállítások mentése
    </button>
  </div>
</div>

<script>
  const INSTRUCTORS = [
    'Ábrahám Zsanna','Adamkó Szilvi','Ajanidisz Teodóra','Andris Anita','Angyal Kyra',
    'Angyal Mercédesz','Antal Laura HU/EN','Auer Bernadett','Bajnok Dávid','Balog Bíborka Bella',
    'Béres Réka','Berki Betti','Borbély Beatrix','Borbély Noémi HU/EN','Böröcz Anita',
    'Boros Orsolya HU/EN','Csonka Anita','Czigány Betti','Dán Vanda','Dankó Krisztina',
    'Dobos Fanny HU/EN','Dráviczki Sándor','Erdélyi Annamari','Erdős Réka','Fábián Roland',
    'Fehér Sándor','Fischer Gábor HU/EN','Fodor Gabriella','Gerencsér Ágnes','Gergye Laura',
    'Gerő Luca','Göde Dorka','Gyurkovics Anikó HU/EN','Hankó Nóri','Harnos Erika',
    'Hesztera Dóra','Hóbel Timi','Hodosi Tamás','Jámbor Bea','Jónás Gergely',
    'Juhász Bianka','Kabai Petra','Kalamár Eszter','Kalló Zsuzsa','Kárpáti Ildikó HU/EN',
    'Kárpáti Móni','Kaszás Lilla','Kazi Alex','Kempelen Zita','Kilin Tomi',
    'Kis Zsófi','Kocsis Kata','Kovács Andrea','Kovács Laura','Kovács Rózsa',
    'Králik Eszter HU/EN','Kurcz Móni','Lebedi Zalán','Léczfalvi Vivien','Life1 Trainer',
    'Lőrincz Ernő','Majoros Anikó','Milovecz Tünde','Moldova Gyuri HU/EN','Molnár Dani',
    'Molnár Tibor','Nagy Vivien','Nagy Zsuzsa','Nyőgér Ági HU/EN','Oli Renáta',
    'Olléh Péter','Osvaldo','Palkó Roberta HU/EN','Párdi Erika HU/EN','Paulovics Adrienn',
    'Petracsek Virág','Polányi Petra','Radácsy Petra','Reitter Zsófia','Samu Kriszti',
    'Sándor Zsanett HU/EN','Sánta Stella HU/EN','Sas Eszter','Serrano Gergő HU/EN','Sira Gyula',
    'Stein Fanni','Szabó Csenge','Szabó Júlia','Szabó Nahid HU/EN','Szalai Ági HU/EN',
    'Szalka Andi','Szalma Borka','Szaunamester','Szaunamester Corvin','Szebenyi Szabina',
    'Széles Natália','Szentgyörgyi Lilien','Szőcs Gabi HU/EN','Szűcs Kata HU/EN','Takács Henriett',
    'Tar Edit','Tihanyi Ákos','Tímea Sifter HU/EN','Tordai Luca','Tornai Piroska HU/EN',
    'Tóth Anett','Trankó Ida','Tücsi S. Márti','Ugróczi Móni','Ujhelyi Zsuzsi HU/EN',
    'Ujvári Cili','Vass Zsófi','Vatamány Krisztina','Veres Zsuzsa','Virág Vera',
    'Völgyes Flávia','Vörös Alexandra','Vujicsity Viktória',
  ];

  function buildInstructorSelect(selectedName) {
    const sel = document.getElementById('instructor');
    const fav = localStorage.getItem('mb_favourite_instructor');
    sel.innerHTML = '';

    if (fav) {
      const pinned = Object.assign(document.createElement('option'), { value: fav, textContent: '⭐ ' + fav });
      sel.appendChild(pinned);
      const sep = Object.assign(document.createElement('option'), { disabled: true, textContent: '──────────────' });
      sel.appendChild(sep);
    }

    INSTRUCTORS.forEach(name => {
      sel.appendChild(Object.assign(document.createElement('option'), { value: name, textContent: name }));
    });

    sel.value = selectedName || fav || INSTRUCTORS[0];
  }

  function saveFavourite() {
    const name = document.getElementById('instructor').value;
    if (!name) return;
    localStorage.setItem('mb_favourite_instructor', name);
    buildInstructorSelect(name);
    const btn = document.getElementById('favBtn');
    btn.textContent = '★';
    setTimeout(() => { btn.textContent = '⭐'; }, 1200);
  }

  // Beállítások betöltése
  const saved = JSON.parse(localStorage.getItem('mb_settings') || '{}');
  if (saved.token)         document.getElementById('gh_token').value      = saved.token;
  if (saved.repo)          document.getElementById('gh_repo').value        = saved.repo;
  buildInstructorSelect(saved.instructor || '');
  if (saved.class_time)    document.getElementById('class_time').value     = saved.class_time;
  if (saved.location)      document.getElementById('location').value       = saved.location;
  if (saved.mb_email)      document.getElementById('mb_email').value       = saved.mb_email;
  if (saved.mb_studio_id)  document.getElementById('mb_studio_id').value   = saved.mb_studio_id;
  if (saved.token || saved.repo)
    document.getElementById('settings-saved').style.display = 'inline-block';

  document.getElementById('run_at').addEventListener('input', updatePreview);
  function updatePreview() {
    const val = document.getElementById('run_at').value;
    const el  = document.getElementById('time_preview');
    if (!val) { el.textContent = ''; return; }
    const dt = new Date(val);
    el.textContent = dt.toLocaleString('hu-HU', {
      year: 'numeric', month: 'long', day: 'numeric',
      hour: '2-digit', minute: '2-digit'
    });
  }

  function toggleSettings() {
    document.getElementById('settings-card').classList.toggle('open');
  }

  function saveSettings() {
    const s = {
      token:        document.getElementById('gh_token').value.trim(),
      repo:         document.getElementById('gh_repo').value.trim(),
      instructor:   document.getElementById('instructor').value.trim(),
      class_time:   document.getElementById('class_time').value.trim(),
      location:     document.getElementById('location').value.trim(),
      mb_email:     document.getElementById('mb_email').value.trim(),
      mb_studio_id: document.getElementById('mb_studio_id').value.trim(),
    };
    localStorage.setItem('mb_settings', JSON.stringify(s));
    document.getElementById('settings-saved').style.display = 'inline-block';
    showStatus('ok', 'Beállítások mentve!');
  }

  async function schedule() {
    const token      = document.getElementById('gh_token').value.trim();
    const repo       = document.getElementById('gh_repo').value.trim();
    const instructor = document.getElementById('instructor').value.trim();
    const classDate  = document.getElementById('class_date').value.trim();
    const classTime  = document.getElementById('class_time').value.trim();
    const location   = document.getElementById('location').value.trim();
    const runAt      = document.getElementById('run_at').value;
    const mbEmail    = document.getElementById('mb_email').value.trim();
    const mbPassword = document.getElementById('mb_password').value;
    const mbStudioId = document.getElementById('mb_studio_id').value.trim();

    if (!token || !repo || !instructor || !classDate || !classTime || !runAt) {
      showStatus('err', 'Kérlek tölts ki minden mezőt!'); return;
    }
    if (!mbEmail || !mbPassword || !mbStudioId) {
      showStatus('err', 'Add meg a Mindbody fiók adatait a Beállításokban!'); return;
    }
    if (!/^\d{2}\/\d{2}\/\d{4}$/.test(classDate)) {
      showStatus('err', 'A dátum formátuma: nap/hónap/év — pl. 30/03/2026'); return;
    }

    showStatus('loading', 'Ütemezés folyamatban...');
    document.getElementById('scheduleBtn').disabled = true;

    const [owner, repoName] = repo.split('/');
    const runAtISO = new Date(runAt).toISOString();

    try {
      // 1. schedule.json mentése a repóba (csak az óra adatai, NEM a jelszó)
      const scheduleData = {
        instructor, class_date: classDate, class_time: classTime, location, run_at: runAtISO
      };
      await saveFile(owner, repoName, token, 'schedule.json', scheduleData,
        `Foglalás ütemezve: ${classDate} – ${instructor}`);

      // 2. Watcher elindítása – jelszó paraméterként megy, nem fájlba
      const dispatchRes = await ghFetch(
        `repos/${owner}/${repoName}/actions/workflows/watcher.yml/dispatches`,
        token, 'POST', {
          ref: 'main',
          inputs: {
            mb_email:     mbEmail,
            mb_password:  mbPassword,
            mb_studio_id: mbStudioId,
          }
        }
      );

      if (dispatchRes.status === 204) {
        const s = JSON.parse(localStorage.getItem('mb_settings') || '{}');
        Object.assign(s, { instructor, location, mb_email: mbEmail, mb_studio_id: mbStudioId });
        localStorage.setItem('mb_settings', JSON.stringify(s));

        const dt = new Date(runAt);
        showStatus('ok',
          `✅ Sikeresen ütemezve!\n\nEdző: ${instructor}\nEdzés dátuma: ${classDate} ${classTime}\nFoglalás indul: ${dt.toLocaleString('hu-HU', { month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' })}\n\nA watcher elindult és figyel.`
        );
      } else {
        const e = await dispatchRes.json().catch(() => ({}));
        showStatus('err', `Watcher indítási hiba (${dispatchRes.status}): ${e.message || 'Ellenőrizd a tokent!'}`);
      }
    } catch(e) {
      showStatus('err', `Hiba: ${e.message}`);
    } finally {
      document.getElementById('scheduleBtn').disabled = false;
    }
  }

  async function saveFile(owner, repo, token, filename, data, message) {
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
    let sha = null;
    const getRes = await ghFetch(`repos/${owner}/${repo}/contents/${filename}`, token);
    if (getRes.ok) sha = (await getRes.json()).sha;
    const body = { message, content };
    if (sha) body.sha = sha;
    const putRes = await ghFetch(`repos/${owner}/${repo}/contents/${filename}`, token, 'PUT', body);
    if (!putRes.ok) {
      const e = await putRes.json();
      throw new Error(`${filename} mentési hiba: ${e.message}`);
    }
  }

  function ghFetch(path, token, method = 'GET', body = null) {
    const opts = {
      method,
      headers: {
        'Authorization': `Bearer ${token}`,
        'Accept': 'application/vnd.github+json',
        'Content-Type': 'application/json',
      }
    };
    if (body) opts.body = JSON.stringify(body);
    return fetch(`https://api.github.com/${path}`, opts);
  }

  function showStatus(type, msg) {
    const el = document.getElementById('status');
    el.className = 'status ' + type;
    el.textContent = msg;
  }
</script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script>
  flatpickr('#class_date', {
    dateFormat: 'd/m/Y',
    minDate: 'today',
    locale: { firstDayOfWeek: 1 },
  });
</script>
</body>
</html>
