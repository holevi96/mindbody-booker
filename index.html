<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mindbody Foglalás</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .container { width: 100%; max-width: 480px; }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 1.5rem; color: #111; }
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 1.25rem;
      margin-bottom: 1rem;
      border: 1px solid #e5e5e5;
    }
    .card-title {
      font-size: 12px; font-weight: 600; color: #888;
      text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 1rem;
    }
    label { font-size: 14px; font-weight: 500; color: #333; display: block; margin-bottom: 6px; margin-top: 14px; }
    label:first-of-type { margin-top: 0; }
    input, select {
      width: 100%; padding: 10px 12px; border: 1px solid #ddd;
      border-radius: 8px; font-size: 15px; color: #111;
      background: #fafafa; transition: border-color 0.15s; -webkit-appearance: none;
    }
    input:focus, select:focus { outline: none; border-color: #555; background: #fff; }
    .hint { font-size: 12px; color: #999; margin-top: 5px; }
    .hint a { color: #555; }
    .btn {
      width: 100%; padding: 12px; background: #111; color: #fff;
      border: none; border-radius: 8px; font-size: 16px; font-weight: 500;
      cursor: pointer; margin-top: 1.25rem; transition: background 0.15s, transform 0.1s;
    }
    .btn:hover { background: #333; }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { background: #999; cursor: not-allowed; }
    .btn-secondary {
      background: #fff; color: #111; border: 1px solid #ddd;
    }
    .btn-secondary:hover { background: #f5f5f5; }
    .status {
      margin-top: 1rem; padding: 12px; border-radius: 8px;
      font-size: 14px; display: none; white-space: pre-line; line-height: 1.6;
    }
    .status.ok { background: #e6f4ea; color: #1a7a38; display: block; }
    .status.err { background: #fce8e8; color: #b91c1c; display: block; }
    .status.loading { background: #f0f0f0; color: #555; display: block; }
    .settings-toggle {
      font-size: 13px; color: #888; cursor: pointer;
      text-decoration: underline; text-align: center;
      margin-top: 0.5rem; display: block;
    }
    .settings-card { display: none; margin-top: 0.75rem; }
    .settings-card.open { display: block; }
    .saved-badge {
      display: inline-block; background: #e6f4ea; color: #1a7a38;
      font-size: 11px; padding: 2px 8px; border-radius: 20px; margin-left: 8px;
    }
    .time-preview { font-size: 13px; color: #555; margin-top: 6px; min-height: 18px; }
  </style>
</head>
<body>
<div class="container">
  <h1>🏋️ Mindbody foglalás</h1>

  <div class="card">
    <div class="card-title">Edzés adatai</div>
    <label>Edző neve</label>
    <input type="text" id="instructor" placeholder="pl. Ujvári Cili">
    <label>Óra neve</label>
    <input type="text" id="class_name" placeholder="pl. TRX köredzés">
    <label>Edzés dátuma</label>
    <input type="text" id="class_date" placeholder="pl. 30/03/2026">
    <p class="hint">Formátum: nap/hónap/év</p>
    <label>Helyszín ID</label>
    <input type="text" id="location" value="2">
    <p class="hint">Life1 Corvin Wellness = 2</p>
  </div>

  <div class="card">
    <div class="card-title">Mikor induljon el a foglalás?</div>
    <label>Időpont</label>
    <input type="datetime-local" id="run_at">
    <p class="hint">Pl. éjfél előtt 2 perccel: 23:58</p>
    <p class="time-preview" id="time_preview"></p>
  </div>

  <button class="btn" id="scheduleBtn" onclick="schedule()">⏰ Foglalás ütemezése</button>
  <div class="status" id="status"></div>

  <span class="settings-toggle" onclick="toggleSettings()">
    ⚙️ Beállítások
    <span id="settings-saved" style="display:none" class="saved-badge">mentve</span>
  </span>

  <div class="card settings-card" id="settings-card">
    <div class="card-title">GitHub beállítások (egyszer kell)</div>
    <label>GitHub token</label>
    <input type="password" id="gh_token" placeholder="ghp_...">
    <p class="hint">
      <a href="https://github.com/settings/personal-access-tokens/new" target="_blank">Létrehozás →</a>
      &nbsp;Actions + Contents: Read & write jogosultság kell
    </p>
    <label>GitHub repó</label>
    <input type="text" id="gh_repo" placeholder="felhasználónév/mindbody-booker">
    <button class="btn btn-secondary" onclick="saveSettings()" style="margin-top:1rem;">
      Beállítások mentése
    </button>
  </div>
</div>

<script>
  // Beállítások betöltése
  const saved = JSON.parse(localStorage.getItem('mb_settings') || '{}');
  if (saved.token)      document.getElementById('gh_token').value    = saved.token;
  if (saved.repo)       document.getElementById('gh_repo').value     = saved.repo;
  if (saved.instructor) document.getElementById('instructor').value  = saved.instructor;
  if (saved.class_name) document.getElementById('class_name').value  = saved.class_name;
  if (saved.location)   document.getElementById('location').value    = saved.location;
  if (saved.token || saved.repo)
    document.getElementById('settings-saved').style.display = 'inline-block';

  document.getElementById('run_at').addEventListener('input', updatePreview);
  function updatePreview() {
    const val = document.getElementById('run_at').value;
    const el  = document.getElementById('time_preview');
    if (!val) { el.textContent = ''; return; }
    const dt = new Date(val);
    el.textContent = dt.toLocaleString('hu-HU', {
      year: 'numeric', month: 'long', day: 'numeric',
      hour: '2-digit', minute: '2-digit'
    });
  }

  function toggleSettings() {
    document.getElementById('settings-card').classList.toggle('open');
  }

  function saveSettings() {
    const s = {
      token:      document.getElementById('gh_token').value.trim(),
      repo:       document.getElementById('gh_repo').value.trim(),
      instructor: document.getElementById('instructor').value.trim(),
      class_name: document.getElementById('class_name').value.trim(),
      location:   document.getElementById('location').value.trim(),
    };
    localStorage.setItem('mb_settings', JSON.stringify(s));
    document.getElementById('settings-saved').style.display = 'inline-block';
    showStatus('ok', 'Beállítások mentve!');
  }

  async function schedule() {
    const token      = document.getElementById('gh_token').value.trim();
    const repo       = document.getElementById('gh_repo').value.trim();
    const instructor = document.getElementById('instructor').value.trim();
    const className  = document.getElementById('class_name').value.trim();
    const classDate  = document.getElementById('class_date').value.trim();
    const location   = document.getElementById('location').value.trim();
    const runAt      = document.getElementById('run_at').value;

    if (!token || !repo || !instructor || !className || !classDate || !runAt) {
      showStatus('err', 'Kérlek tölts ki minden mezőt!'); return;
    }
    if (!/^\d{2}\/\d{2}\/\d{4}$/.test(classDate)) {
      showStatus('err', 'A dátum formátuma: nap/hónap/év — pl. 30/03/2026'); return;
    }

    showStatus('loading', 'Ütemezés folyamatban...');
    document.getElementById('scheduleBtn').disabled = true;

    const [owner, repoName] = repo.split('/');
    const runAtISO = new Date(runAt).toISOString();

    try {
      // 1. schedule.json fájl írása a repóba
      const scheduleData = { instructor, class_name: className, class_date: classDate, location, run_at: runAtISO };
      const content = btoa(unescape(encodeURIComponent(JSON.stringify(scheduleData, null, 2))));

      // Meglévő fájl SHA lekérése (ha van)
      let sha = null;
      const getRes = await ghFetch(`repos/${owner}/${repoName}/contents/schedule.json`, token);
      if (getRes.ok) {
        const existing = await getRes.json();
        sha = existing.sha;
      }

      const putBody = { message: `Foglalás ütemezve: ${classDate} – ${instructor}`, content };
      if (sha) putBody.sha = sha;

      const putRes = await ghFetch(`repos/${owner}/${repoName}/contents/schedule.json`, token, 'PUT', putBody);
      if (!putRes.ok) {
        const e = await putRes.json();
        showStatus('err', `Fájl mentési hiba: ${e.message}`); return;
      }

      // 2. Watcher workflow elindítása
      const dispatchRes = await ghFetch(
        `repos/${owner}/${repoName}/actions/workflows/watcher.yml/dispatches`,
        token, 'POST', { ref: 'main' }
      );

      if (dispatchRes.status === 204) {
        // Elmentjük az adatokat
        const s = JSON.parse(localStorage.getItem('mb_settings') || '{}');
        Object.assign(s, { instructor, class_name: className, location });
        localStorage.setItem('mb_settings', JSON.stringify(s));

        const dt = new Date(runAt);
        showStatus('ok',
          `✅ Sikeresen ütemezve!\n\nEdző: ${instructor}\nÓra: ${className}\nEdzés dátuma: ${classDate}\nFoglalás indul: ${dt.toLocaleString('hu-HU', { month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' })}\n\nA watcher elindult és figyel.`
        );
      } else {
        const e = await dispatchRes.json().catch(() => ({}));
        showStatus('err', `Watcher indítási hiba (${dispatchRes.status}): ${e.message || 'Ellenőrizd a tokent!'}`);
      }
    } catch (e) {
      showStatus('err', `Hálózati hiba: ${e.message}`);
    } finally {
      document.getElementById('scheduleBtn').disabled = false;
    }
  }

  function ghFetch(path, token, method = 'GET', body = null) {
    const opts = {
      method,
      headers: {
        'Authorization': `Bearer ${token}`,
        'Accept': 'application/vnd.github+json',
        'Content-Type': 'application/json',
      }
    };
    if (body) opts.body = JSON.stringify(body);
    return fetch(`https://api.github.com/${path}`, opts);
  }

  function showStatus(type, msg) {
    const el = document.getElementById('status');
    el.className = 'status ' + type;
    el.textContent = msg;
  }
</script>
</body>
</html>
